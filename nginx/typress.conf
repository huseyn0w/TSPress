# ---------------------------------------------------------------------------
# Typress production nginx config (reverse proxy in front of web + api).
#
# Topology: the public site (Next.js) is served from your main domain, and the
# API (NestJS) from an `api.` subdomain. This keeps the API's root-level routes
# (/auth, /public, /posts, /uploads, ...) from colliding with Next's own
# /api/auth/* routes, and is the simplest correct production shape.
#
#   web   -> https://example.com         (Next.js, container `web:3000`)
#   api   -> https://api.example.com     (NestJS,  container `api:4000`)
#
# Set in your .env (consumed by docker-compose.prod.yml):
#   PUBLIC_WEB_URL=https://example.com
#   PUBLIC_API_URL=https://api.example.com   # baked into the web bundle at build
#
# TLS: the 80->443 redirect and `listen 443 ssl` blocks below are commented out.
# Run certbot (see docs/deployment/vps.md) to obtain certificates, then enable
# them. For a local dry-run, the plain :80 blocks are all you need.
# ---------------------------------------------------------------------------

# Shared proxy headers so the upstream sees the real client (rate limiting,
# Auth.js callback URLs, and canonical links all depend on these).
proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;
proxy_set_header Upgrade           $http_upgrade;
proxy_set_header Connection        "upgrade";

# gzip text assets and API JSON.
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_min_length 1024;
gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml+rss application/manifest+json;

# Security headers applied to every response (HSTS is enabled with TLS only).
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# --- Public site (Next.js) -------------------------------------------------
server {
  listen 80;
  # For a local dry-run this is `localhost`; in production use your domain.
  server_name localhost example.com;

  # Redirect to HTTPS once certificates are in place:
  # return 301 https://$host$request_uri;

  location / {
    proxy_pass http://web:3000;
  }
}

# --- API (NestJS) on the api. subdomain ------------------------------------
server {
  listen 80;
  server_name api.localhost api.example.com;

  # Allow uploads a little above the API's MEDIA_MAX_SIZE_MB (default 10 MB) to
  # cover multipart overhead. If you raise MEDIA_MAX_SIZE_MB, raise this too —
  # otherwise nginx returns 413 before the request reaches the API.
  client_max_body_size 12m;

  # Serve uploaded media straight through to the API process. (Alternatively,
  # mount the `uploads` volume into nginx and serve it directly here.)
  location /uploads/ {
    proxy_pass http://api:4000;
  }

  location / {
    proxy_pass http://api:4000;
  }
}

